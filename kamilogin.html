<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密系統 - 管理員登入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
        }

        body {
            /* 專業漸層背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: white;
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            outline: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #764ba2;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>身份驗證</h2>
    <p class="subtitle">請輸入管理員憑據以查看卡密</p>

    <div class="input-group">
        <label>帳號</label>
        <input type="text" id="username" placeholder="請輸入帳號" autocomplete="off">
    </div>

    <div class="input-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼">
    </div>

    <button class="login-btn" onclick="handleLogin()">登入系統</button>
    
    <p id="error-msg"></p>
</div>

<script>
    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // 設定正確的帳號密碼
        const correctUser = "admin";
        const correctPass = "123456";
        const targetUrl = "https://jack4432.com/888";

        if (user === correctUser && pass === correctPass) {
            errorMsg.style.color = "#4dff88";
            errorMsg.innerText = "驗證成功，正在跳轉...";
            
            // 延遲 0.8 秒跳轉，增加使用者體驗感
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 800);
        } else {
            errorMsg.innerText = "帳號或密碼錯誤，請重新輸入";
            // 簡單的抖動效果感官提示
            const container = document.querySelector('.login-container');
            container.style.animation = 'none';
            container.offsetHeight; /* 觸發重繪 */
            container.style.animation = 'shake 0.4s';
        }
    }

    // 監聽 Enter 鍵直接登入
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
</script>

<style>
    /* 錯誤時的抖動動畫 */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
</style>

</body>
</html>
