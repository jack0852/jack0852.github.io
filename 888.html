<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密管理中心</title>
    <style>
        :root {
            --phone-color: #4a90e2;
            --tablet-color: #673ab7;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --used-text: #a0a0a0;
            --used-bg: #f5f5f5;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* 響應式佈局：預設兩欄 */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* 手機寬度時改為單欄 */
        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }

        .phone-title { color: var(--phone-color); border-color: var(--phone-color); }
        .tablet-title { color: var(--tablet-color); border-color: var(--tablet-color); }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: #fafafa;
            border-radius: 6px;
            border-left: 4px solid #ddd;
        }

        .item.unused { border-left-color: #4caf50; }
        .item.used { background: var(--used-bg); opacity: 0.7; }

        .code-info { flex-grow: 1; }
        
        .code-text {
            display: block;
            font-family: monospace;
            font-size: 0.95rem;
            font-weight: bold;
            word-break: break-all;
        }

        .used .code-text { text-decoration: line-through; color: var(--used-text); }

        .status-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            display: inline-block;
        }

        .tag-unused { background: #e8f5e9; color: #2e7d32; }
        .tag-used { background: #eeeeee; color: #757575; }

        .copy-btn {
            margin-left: 10px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .copy-btn:active { transform: scale(0.95); }
        .copy-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>證書卡密分發中心</h1>

    <div class="grid-layout">
        <div class="section-card">
            <div class="section-title phone-title">📱 手機專用卡密</div>
            
            <div class="item used">
                <div class="code-info">
                    <span class="code-text">SS-GTP6CD720808A34</span>
                    <span class="status-tag tag-used">已使用</span>
                </div>
                <button class="copy-btn" disabled>複製</button>
            </div>

            <div class="item unused">
                <div class="code-info">
                    <span class="code-text" id="p1">SS-GTPC632F0CB24A8</span>
                    <span class="status-tag tag-unused">未使用</span>
                </div>
                <button class="copy-btn" onclick="copy('p1')">複製</button>
            </div>

            <div class="item unused">
                <div class="code-info">
                    <span class="code-text" id="p2">SS-GTPE0B71546C0DF</span>
                    <span class="status-tag tag-unused">未使用</span>
                </div>
                <button class="copy-btn" onclick="copy('p2')">複製</button>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title tablet-title">💻 平板專用卡密</div>
            
            <div class="item used">
                <div class="code-info">
                    <span class="code-text">SS-BZD129F4276550</span>
                    <span class="status-tag tag-used">已使用</span>
                </div>
                <button class="copy-btn" disabled>複製</button>
            </div>

            <div class="item unused">
                <div class="code-info">
                    <span class="code-text" id="t1">SS-BZA664A42E26D4</span>
                    <span class="status-tag tag-unused">未使用</span>
                </div>
                <button class="copy-btn" onclick="copy('t1')">複製</button>
            </div>

            <div class="item unused">
                <div class="code-info">
                    <span class="code-text" id="t2">SS-BZ97C832AC9C29</span>
                    <span class="status-tag tag-unused">未使用</span>
                </div>
                <button class="copy-btn" onclick="copy('t2')">複製</button>
            </div>
        </div>
    </div>
</div>

<script>
    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('複製成功：' + text);
        }).catch(err => {
            console.error('無法複製', err);
        });
    }
</script>

</body>
</html>
