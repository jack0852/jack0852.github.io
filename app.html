<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4783872680179851"
     crossorigin="anonymous"></script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 應用部署助手 - 管理中心</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --success-color: #34c759;
            --line-green: #06c755;
            --blog-color: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #1c1c1e;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            position: relative;
        }

        .section-header {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1c1c1e;
        }

        .desc {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .btn:last-child { margin-bottom: 0; }

        .btn:active { transform: scale(0.96); }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-blog { background-color: var(--blog-color); color: white; }

        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f8f8;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .resource-item:active { background: #eee; }
        .resource-tag { font-size: 11px; color: #8e8e93; font-weight: normal; }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aeaeae;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>應用部署與管理中心</h1>

        <div class="card">
            <div class="section-header">🛠️ 開發工具獲取</div>
            <p class="desc">
                獲取 iOS 開發者必備的部署工具<br>
                請在授權環境下進行操作
            </p>
            
            <button class="btn btn-primary" onclick="handleVerify('https://khoindvn.io.vn', '0222')">
                獲取 iOS 部署工具
            </button>
        </div>

        <div class="card">
            <div class="section-header">📖 使用教學指南</div>
            <p class="desc">
                不清楚如何配置環境？<br>
                歡迎查看詳細的圖文教學博文
            </p>
            <button class="btn btn-blog" onclick="handleVerify('https://jackblog.pixnet.net/blog', '0222')">
                前往 Jack Blog 查看教學
            </button>
        </div>

        <div class="card">
            <div class="section-header" style="font-size: 18px;">📦 推薦開發資源庫</div>
            <div class="resource-list">
                <a href="https://decrypt.day" target="_blank" class="resource-item">
                    <span>Decrypt 資源站</span>
                    <span class="resource-tag">立即前往 →</span>
                </a>
                <a href="https://ipacrack.com" target="_blank" class="resource-item">
                    <span>IPA 檔案庫</span>
                    <span class="resource-tag">立即前往 →</span>
                </a>
            </div>
        </div>

        <div class="footer">
            更新時間：2026-03-23<br>
            本站僅提供技術研究與開發者工具交流
        </div>
    </div>

    <script>
        // 統一驗證函數 (密碼均為 0222)
        function handleVerify(url, correctPass) {
            const pass = prompt("請輸入存取驗證碼：");
            if (pass === correctPass) {
                window.location.href = url;
            } else if (pass !== null) {
                alert("驗證碼錯誤，請重新獲取！");
            }
        }
    </script>

</body>
</html>
