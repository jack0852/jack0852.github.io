<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA 簽名工具</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: #1d1d1f;
            margin-bottom: 30px;
        }

        /* 介面卡片樣式 */
        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .description {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
            background-color: #005bbd;
        }

        .btn-secondary {
            background-color: #f2f2f7;
            color: var(--primary-color);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #aeaeae;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IPA 簽名工具 + 證書下載</h1>

        <div class="card">
            <div class="section-title">免費通道</div>
            <p class="description">支持 iOS 14.0 - iOS 26<br>穩定簽名，即開即用</p>
            
            <div class="btn-group">
                <button class="btn" onclick="checkPassword('https://khoindvn.io.vn')">安裝 IPA 簽名工具</button>
                
                <button class="btn btn-secondary" onclick="checkPassword('https://jack0852.github.io/zhengshu.zip')">安裝證書</button>
            </div>
        </div>

        <div class="footer">
            © 2026 IPA 簽名助手. All rights reserved.
        </div>
    </div>

    <script>
        function checkPassword(url) {
            // 彈出密碼輸入框
            const password = prompt("請輸入安裝密碼：");

            if (password === "1111") {
                // 密碼正確，跳轉連結
                window.location.href = url;
            } else if (password === null) {
                // 使用者點擊取消
                return;
            } else {
                // 密碼錯誤
                alert("密碼錯誤，請重新輸入！");
            }
        }
    </script>

</body>
</html>
