<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4783872680179851"
     crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPA 簽名大師 - 定制個人證書</title>
    <style>
        :root {
            --primary-color: #007aff;
            --premium-gold: #ffcc00;
            --premium-bg: #1c1c1e;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --line-green: #06c755;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #1c1c1e;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            position: relative;
        }

        .card-premium {
            background: var(--premium-bg);
            color: white;
            border: 2px solid var(--premium-gold);
        }

        .section-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .price-tag {
            margin: 10px 0;
        }
        .original-price {
            text-decoration: line-through;
            color: #8e8e93;
            font-size: 14px;
        }
        .current-price {
            color: var(--premium-gold);
            font-size: 28px;
            font-weight: 900;
            margin: 5px 0;
        }
        .discount-badge {
            background: var(--danger-color);
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            vertical-align: middle;
        }

        .highlight-box {
            background: rgba(255, 204, 0, 0.1);
            border: 1px dashed var(--premium-gold);
            padding: 10px;
            border-radius: 12px;
            margin: 15px 0;
            color: var(--premium-gold);
            font-size: 16px;
            font-weight: 900;
        }

        .line-box {
            background: var(--line-green);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: bold;
            font-size: 15px;
        }

        .badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: var(--premium-gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
        }

        .desc {
            font-size: 14px;
            color: #a1a1a6;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn:active { transform: scale(0.96); }

        .btn-premium { background: linear-gradient(135deg, #ffcc00, #ff9500); color: #000; }
        .btn-free { background-color: var(--primary-color); color: white; margin-bottom: 12px; }
        .btn-outline { background-color: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); }

        /* IPA 資源區塊樣式 */
        .resource-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }
        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f8f8;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .resource-item:active { background: #eee; }
        .resource-tag { font-size: 11px; color: #8e8e93; font-weight: normal; }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aeaeae;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IPA 簽名中心</h1>

        <div class="card card-premium">
            <div class="badge">限時 81 折優惠</div>
            <div class="section-header">💎 專業個人證書</div>
            
            <div class="price-tag">
                <span class="original-price">原價 $3580</span>
                <div class="current-price">
                    $2899 <span class="discount-badge">現省 $681</span>
                </div>
            </div>

            <div class="highlight-box">
                🛡️ 承諾 90 天內不掉簽
            </div>

            <p class="desc">
                定制專屬個人證書<br>
                支持最新 iOS 版本，<span style="color:var(--success-color)">100% 安裝成功</span>
            </p>

            <div class="line-box">
                下單請加官方 LINE：@500ypcau<br>
                <span style="font-size: 11px;">( 記得要加 @ 符號 )</span>
            </div>
            
            <button class="btn btn-premium" onclick="handlePremium()">
                安裝專業付費工具 + 個人證書
            </button>
        </div>

        <div class="card">
            <div class="section-header">📱 普通免費方案</div>
            <p class="desc" style="color: #666;">
                公共共享證書：<span style="color:var(--danger-color); font-weight: bold;">不一定成功</span><br>
                隨時失效掉簽，無售後保障
            </p>
            <button class="btn btn-free" onclick="handleFree('https://khoindvn.io.vn', '1111')">
                安裝免費 IPA 工具
            </button>
            <button class="btn btn-outline" onclick="handleFree('https://jack0852.github.io/zhengshu.zip', '1111')">
                下載免費證書 (zip)
            </button>
        </div>

        <div class="card resource-card">
            <div class="section-header" style="font-size: 16px; margin-bottom: 12px; color: #1c1c1e;">📦 推薦 IPA 下載資源</div>
            <div class="resource-list">
                <a href="https://decrypt.day" target="_blank" class="resource-item">
                    <span>Decrypt.day</span>
                    <span class="resource-tag">前往下載 →</span>
                </a>
                <a href="https://ipacrack.com" target="_blank" class="resource-item">
                    <span>IPA Crack</span>
                    <span class="resource-tag">前往下載 →</span>
                </a>
            </div>
        </div>

        <div class="footer">
            更新時間：2026-03-08<br>
            售後支持與卡密購買請聯繫官方 LINE
        </div>
    </div>

    <script>
        function handlePremium() {
            alert("卡密請找官方 LINE：@500ypcau 購買");
            const pass = prompt("請輸入 90 天定制個人證書卡密：");
            if (pass === "111111") {
                window.location.href = "https://qidian.letui.xyz";
            } else if (pass !== null) {
                alert("卡密錯誤！請聯繫 LINE 客服。");
            }
        }

        function handleFree(url, correctPass) {
            const pass = prompt("請輸入免費通道密碼：");
            if (pass === correctPass) {
                window.location.href = url;
            } else if (pass !== null) {
                alert("密碼錯誤！");
            }
        }
    </script>

</body>
</html>
