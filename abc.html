<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑞良官方網站</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(45deg,#fff7cc,#ffd700);
    overflow-x:hidden;
}

/* 頭像閃光 */
.avatar{
    width:120px;
    border-radius:50%;
    animation: glow 1.5s infinite alternate;
}
@keyframes glow{
    from{box-shadow:0 0 10px gold;}
    to{box-shadow:0 0 30px orange;}
}

/* 瑞良幣 */
.coinBox{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    padding:8px 12px;
    border-radius:30px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:bold;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    z-index:999;
}
.coinBox img{
    width:40px;
    border-radius:50%;
}

/* 跑馬燈卡卡效果 */
.marquee{
    white-space:nowrap;
    overflow:hidden;
    background:black;
    color:yellow;
    padding:10px;
    font-weight:bold;
}
.marquee span{
    display:inline-block;
    padding-left:100%;
    animation: run 8s linear infinite;
}
@keyframes run{
    0%{transform:translateX(0);}
    50%{transform:translateX(-50%);}
    51%{transform:translateX(-48%);} /* 製造頓一下 */
    100%{transform:translateX(-100%);}
}

/* 廣告 */
.adOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
}
.adBox{
    position:relative;
    background:white;
    padding:20px;
    border-radius:15px;
}
.adBox img{
    max-width:80vw;
    max-height:70vh;
}
.closeBtn{
    position:absolute;
    top:5px;
    right:5px;
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
}

/* 假X */
.fakeX{
    position:absolute;
    background:black;
    color:white;
    padding:4px 8px;
    font-size:12px;
    cursor:pointer;
}
.smallAd{
    position:fixed;
    width:120px;
    z-index:1500;
}
.smallAd img{
    width:100%;
}
.smallClose{
    background:red;
    color:white;
    border:none;
    width:100%;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="coinBox">
<img src="https://jack0852.github.io/IMG_1538.jpeg">
瑞良幣：<span id="coin">0</span>
</div>

<center style="margin-top:80px;">
<img src="https://jack0852.github.io/IMG_1538.jpeg" class="avatar">
<h1>瑞良官方網站</h1>
<button onclick="watchAd()">🎬 看廣告賺瑞良幣</button>
</center>

<div class="marquee">
<span>📢 支持瑞良、追蹤瑞良、按讚瑞良、支持瑞良、追蹤瑞良、按讚瑞良</span>
</div>

<!-- 小廣告 -->
<div class="smallAd" style="bottom:10px;right:10px;">
<img src="https://img.tusij.com/tgs_assets/ips_templ_preview/cc/49/98/lg_3265657_1593945333_5f01acf5b284f.jpg%21w390?auth_key=1796083200-0-0-817965df09ee38f2b4bd3305f8fb545c">
<button class="smallClose" onclick="triggerBigAd()">關閉</button>
</div>

<div class="smallAd" style="top:100px;left:10px;">
<img src="https://img.alicdn.com/imgextra/i2/2217289547338/O1CN01tQpkYA244rJcP5fVT_!!2217289547338.jpg_q50.jpg_.webp">
<button class="smallClose" onclick="triggerBigAd()">關閉</button>
</div>

<div class="smallAd" style="bottom:150px;left:50%;">
<img src="https://img.alicdn.com/imgextra/i1/3558912124/O1CN01asJYFN1RYqDDp09td_!!3558912124.jpg_q50s50.jpg">
<button class="smallClose" onclick="triggerBigAd()">關閉</button>
</div>

<script>

let coin = localStorage.getItem("rcoin") || 0;
document.getElementById("coin").innerText = coin;

function addCoin(){
    coin++;
    localStorage.setItem("rcoin", coin);
    document.getElementById("coin").innerText = coin;
}

function createAd(imgUrl){
    let overlay=document.createElement("div");
    overlay.className="adOverlay";

    let box=document.createElement("div");
    box.className="adBox";

    let img=document.createElement("img");
    img.src=imgUrl;

    let close=document.createElement("button");
    close.innerText="關閉";
    close.className="closeBtn";
    close.onclick=()=>document.body.removeChild(overlay);

    box.appendChild(close);
    box.appendChild(img);

    /* 假X */
    for(let i=0;i<4;i++){
        let fake=document.createElement("div");
        fake.innerText="X";
        fake.className="fakeX";
        fake.style.top=Math.random()*200+"px";
        fake.style.left=Math.random()*200+"px";
        fake.onclick=()=>alert("你按到假的 😆");
        box.appendChild(fake);
    }

    overlay.appendChild(box);
    document.body.appendChild(overlay);
}

function watchAd(){
    createAd("https://jack0852.github.io/IMG_1751.jpeg");
    addCoin();
}

function triggerBigAd(){
    createAd("https://jack0852.github.io/IMG_1749.jpeg");
}

window.onload=function(){
    createAd("https://jack0852.github.io/IMG_1751.jpeg");
}

</script>

</body>
</html>
