<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack 精選影像</title>

<style>
/* ===== 全域 ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
}

body {
    background: #050505;
    color: white;
    overflow-x: hidden;
}

/* ===== 跑馬燈 ===== */
.marquee {
    width: 100%;
    overflow: hidden;
    background: linear-gradient(90deg, #000, #1a1a1a, #000);
    padding: 12px 0;
    border-bottom: 1px solid rgba(255, 215, 0, 0.5);
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
}

.marquee-content {
    display: inline-block;
    white-space: nowrap;
    color: #ffd700;
    font-weight: bold;
    letter-spacing: 1px;
    animation: marquee 15s linear infinite;
}

@keyframes marquee {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* ===== 主區 ===== */
.premium {
    padding: 80px 20px;
    text-align: center;
}

.premium h1 {
    font-size: 42px;
    margin-bottom: 60px;
    background: linear-gradient(45deg, #ffd700, #fff2a8, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
}

/* ===== 排版 ===== */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1200px;
    margin: auto;
}

/* ===== 卡片 ===== */
.card {
    position: relative;
    padding: 60px 20px;
    border-radius: 20px;
    background: linear-gradient(145deg, #151515, #222);
    border: 1px solid rgba(255, 215, 0, 0.2);
    overflow: hidden;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(255, 215, 0, 0.15);
    border-color: rgba(255, 215, 0, 0.5);
}

/* ===== 最新標籤 (緞帶) ===== */
.badge-new {
    position: absolute;
    top: 20px;
    right: -45px;
    background: linear-gradient(45deg, #ff3333, #ff0055);
    color: white;
    padding: 5px 50px;
    font-size: 13px;
    font-weight: bold;
    transform: rotate(45deg);
    z-index: 3;
    box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
    letter-spacing: 1px;
}

/* ===== 亮光效果 ===== */
.shine {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transform: translateX(-100%);
    transition: 0.6s;
    pointer-events: none;
    z-index: 1;
}

.card:hover .shine {
    transform: translateX(100%);
}

/* ===== 圖示動畫 ===== */
.icon {
    font-size: 45px;
    color: #ffd700;
    margin-bottom: 20px;
    animation: float 2s ease-in-out infinite;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

.card h3 {
    margin-bottom: 12px;
    color: #fff;
    font-size: 22px;
    z-index: 2;
}

.card p {
    color: #aaa;
    font-size: 15px;
    margin-bottom: 20px;
    z-index: 2;
}

/* 整卡連結 */
a.full-link {
    position: absolute;
    inset: 0;
    z-index: 10;
}

/* ===== 按鈕組 ===== */
.btn-group {
    display: flex;
    gap: 12px;
    z-index: 10;
    position: relative;
    width: 100%;
    justify-content: center;
}

.action-btn {
    padding: 10px 18px;
    background: transparent;
    border: 1px solid #ffd700;
    color: #ffd700;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
}

.action-btn:hover {
    background: #ffd700;
    color: #000;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    transform: scale(1.05);
}

/* ===== RWD ===== */
@media(max-width: 992px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 600px) {
    .container {
        grid-template-columns: 1fr;
    }
    .premium h1 {
        font-size: 32px;
    }
}
</style>
</head>
