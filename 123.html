<style>

/* ===== 全域 ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
}

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* ===== 跑馬燈 ===== */
.marquee{
    width:100%;
    overflow:hidden;
    background:linear-gradient(90deg,#000,#111,#000);
    padding:12px 0;
    border-bottom:1px solid gold;
}

.marquee-content{
    display:inline-block;
    white-space:nowrap;
    color:gold;
    font-weight:bold;
    animation:marquee 15s linear infinite;
}

@keyframes marquee{
    from{ transform:translateX(100%); }
    to{ transform:translateX(-100%); }
}

/* ===== 主區 ===== */
.premium{
    padding:100px 20px;
    text-align:center;
}

.premium h1{
    font-size:40px;
    margin-bottom:70px;
    background:linear-gradient(45deg,gold,#ffd700,#fff2a8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== 排版 ===== */
.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
    max-width:1200px;
    margin:auto;
}

/* ===== 卡片 ===== */
.card{
    position:relative;
    padding:70px 20px;
    border-radius:25px;
    background:linear-gradient(145deg,#111,#1c1c1c);
    border:1px solid rgba(255,215,0,0.3);
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-12px);
    box-shadow:0 25px 45px rgba(255,215,0,0.25);
}

/* ===== 金色流光 ===== */
.card::before{
    content:"";
    position:absolute;
    width:150%;
    height:150%;
    background:linear-gradient(120deg,
        transparent,
        rgba(255,215,0,0.4),
        transparent);
    top:-100%;
    left:-100%;
    transform:rotate(25deg);
    transition:0.7s;
}

.card:hover::before{
    top:100%;
    left:100%;
}

/* ===== 亮光掃過 ===== */
.shine{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent);
    transform:translateX(-100%);
    transition:0.6s;
}

.card:hover .shine{
    transform:translateX(100%);
}

/* ===== 播放動畫 ===== */
.play{
    font-size:45px;
    color:gold;
    margin-bottom:20px;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}

.card h3{
    margin-bottom:15px;
}

.card p{
    color:#ccc;
}

/* 整卡可點 */
.card a{
    position:absolute;
    inset:0;
}

/* ===== RWD ===== */
@media(max-width:992px){
    .container{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    .container{
        grid-template-columns:1fr;
    }

    .premium h1{
        font-size:28px;
    }
}

</style>
</head>

<body>
