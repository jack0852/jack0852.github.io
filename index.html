<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack官方網站-首頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1d1d1f;
            --text-sub: rgba(60, 60, 67, 0.7);
            --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(28, 28, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f5f5f7;
            --text-sub: rgba(180, 180, 185, 0.6);
        }

        body {
            background: #f5f5f7;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            min-height: 100vh;
            overflow-y: auto; /* 允許上下滑動 */
            transition: background 0.5s ease;
        }

        [data-theme="dark"] body { background: #000000; }

        /* 液態玻璃主卡片 */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 44px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }

        /* 進場動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            animation: revealIn 0.8s var(--spring-easing) forwards;
        }
        @keyframes revealIn { to { opacity: 1; transform: translateY(0); } }

        /* 按鈕 iOS 彈性縮放 */
        .ios-btn {
            background: var(--text-primary);
            color: white;
            padding: 18px 32px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 17px;
            transition: transform 0.4s var(--spring-easing), opacity 0.2s;
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }
        [data-theme="dark"] .ios-btn { background: #ffffff; color: #000000; }
        .ios-btn:active { transform: scale(0.92); opacity: 0.8; }

        /* 密碼彈窗美化 */
        .modal-blur { backdrop-filter: blur(25px); background: rgba(0,0,0,0.4); z-index: 2000; }
        .modal-content { animation: modalPop 0.4s var(--spring-easing); }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .ios-input {
            background: rgba(0,0,0,0.05);
            border: none;
            outline: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            letter-spacing: 6px;
        }
        [data-theme="dark"] .ios-input { background: rgba(255,255,255,0.1); color: white; }

        /* 主題切換按鈕 */
        #themeToggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1100;
        }
    </style>
</head>
<body class="p-6 md:p-12 antialiased">

    <div class="max-w-3xl mx-auto pt-16 pb-32">
        
        <header class="reveal text-center mb-16" style="animation-delay: 0.1s;">
            <div class="relative inline-block">
                <img src="https://jack4432.com/S__6504471.jpg" alt="Jack" class="relative w-40 h-40 rounded-full object-cover shadow-2xl border-4 border-white dark:border-zinc-900">
            </div>
            <h1 class="mt-8 text-4xl font-black tracking-tight">Jack</h1>
            <p style="color: var(--text-sub)" class="font-medium mt-3 text-lg">Digital Creator · AI 研究員 · 技術玩家</p>
        </header>

        <section class="reveal liquid-glass p-10 md:p-14 mb-10 text-center md:text-left" style="animation-delay: 0.2s;">
            <h2 class="text-2xl font-black mb-6">關於我</h2>
            <p class="leading-relaxed opacity-80 text-xl font-medium mb-10">
                你好！我是 <span class="text-blue-500 font-bold">Jack</span>。我熱衷於探索人工智慧的無限可能，致力於系統優化與硬體研究。在我的頻道中，你可以發現跨裝置的完美工作流與最新的科技心得。
            </p>
            
            <div class="flex flex-col md:flex-row gap-4">
                <button onclick="openPasswordModal()" class="ios-btn flex-1">
                    查看 Jack Blog
                </button>
            </div>
        </section>

        <div class="reveal opacity-20 text-center py-20" style="animation-delay: 0.4s;">
            <p class="text-sm font-bold tracking-widest uppercase">Scrolling for more</p>
            <i class="fas fa-chevron-down mt-4 animate-bounce"></i>
        </div>

    </div>

    <button id="themeToggle" class="w-12 h-12 liquid-glass flex items-center justify-center">
        <i class="fas fa-circle-half-stroke text-zinc-500"></i>
    </button>

    <div id="passwordModal" class="fixed inset-0 flex items-center justify-center modal-blur hidden p-6">
        <div class="liquid-glass w-full max-w-sm p-10 modal-content shadow-2xl">
            <div class="text-center mb-8">
                <h3 class="text-xl font-bold">身分驗證</h3>
                <p class="text-sm opacity-50 mt-1">請輸入 4 位數密碼</p>
            </div>
            <input type="password" id="pwInput" class="ios-input mb-8" placeholder="••••" maxlength="4">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold opacity-30">取消</button>
                <button onclick="checkPassword()" class="flex-1 py-4 bg-blue-500 text-white rounded-2xl font-bold active:scale-95 transition">確認</button>
            </div>
        </div>
    </div>

    <div id="blogChoiceModal" class="fixed inset-0 flex items-center justify-center modal-blur hidden p-6">
        <div class="liquid-glass w-full max-w-sm p-10 modal-content">
            <h3 class="text-xl font-bold mb-8 text-center">選擇站點</h3>
            <div class="space-y-4">
                <a href="https://jackblog.pixnet.net/blog" class="block w-full p-5 bg-black/5 dark:bg-white/5 rounded-3xl text-center font-bold hover:bg-blue-500 hover:text-white transition-all active:scale-95">Pixnet 部落格</a>
                <a href="https://dev-jack4432.pantheonsite.io" class="block w-full p-5 bg-black/5 dark:bg-white/5 rounded-3xl text-center font-bold hover:bg-indigo-500 hover:text-white transition-all active:scale-95">Jack 部落格 (2026)</a>
            </div>
            <button onclick="closeBlogChoice()" class="w-full mt-8 text-sm font-bold opacity-30">返回首頁</button>
        </div>
    </div>

    <script>
        const PASSWORD = "0222";

        function openPasswordModal() {
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('pwInput').focus();
        }

        function closeModal() {
            document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('pwInput').value = '';
        }

        function checkPassword() {
            if(document.getElementById('pwInput').value === PASSWORD) {
                closeModal();
                document.getElementById('blogChoiceModal').classList.remove('hidden');
            } else {
                alert('密碼錯誤');
                document.getElementById('pwInput').value = '';
            }
        }

        function closeBlogChoice() {
            document.getElementById('blogChoiceModal').classList.add('hidden');
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });
    </script>
</body>
</html>
